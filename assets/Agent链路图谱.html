<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent 系统架构与完整链路图谱</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #65718a;
      --line: #d7deea;
      --panel: #ffffff;
      --page: #eef2f7;
      --blue: #2463d4;
      --blue-soft: #eaf1ff;
      --green: #2f855a;
      --green-soft: #eaf8ef;
      --amber: #b15c00;
      --amber-soft: #fff4df;
      --red: #c13c36;
      --red-soft: #fff0ef;
      --cyan: #11788a;
      --cyan-soft: #e8f7f9;
      --gray: #526077;
      --gray-soft: #f1f4f8;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; background: var(--page); color: var(--ink); }
    button, input { font: inherit; letter-spacing: 0; }
    .app { height: 100%; display: grid; grid-template-rows: 70px minmax(0, 1fr); }
    header {
      display: flex; align-items: center; gap: 18px; padding: 0 20px;
      background: #fff; border-bottom: 1px solid var(--line); min-width: 0;
    }
    .brand { min-width: 310px; }
    .brand h1 { font-size: 19px; margin: 0; font-weight: 750; }
    .brand p { margin: 5px 0 0; color: var(--muted); font-size: 12px; }
    .search { flex: 1; max-width: 520px; position: relative; }
    .search input {
      width: 100%; height: 38px; border: 1px solid var(--line); background: #f8fafc;
      padding: 0 38px 0 12px; border-radius: 6px; color: var(--ink); outline: none;
    }
    .search input:focus { border-color: #8badf2; background: #fff; }
    .search span { position: absolute; right: 12px; top: 9px; color: var(--muted); font-size: 13px; }
    .toolbar { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .icon-btn {
      width: 36px; height: 36px; border: 1px solid var(--line); background: #fff; color: var(--ink);
      border-radius: 6px; cursor: pointer; font-size: 18px; display: grid; place-items: center;
    }
    .icon-btn:hover { background: #f3f6fa; border-color: #aeb9ca; }
    .zoom-label { width: 55px; text-align: center; color: var(--muted); font-size: 12px; }
    .layout { min-height: 0; display: grid; grid-template-columns: 260px minmax(0, 1fr) 330px; }
    nav { background: #fff; border-right: 1px solid var(--line); overflow-y: auto; padding: 16px 12px; }
    .nav-title { padding: 0 8px 10px; font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; }
    .nav-item {
      width: 100%; text-align: left; border: 1px solid transparent; background: transparent; padding: 11px 10px;
      border-radius: 6px; cursor: pointer; margin-bottom: 5px; color: var(--ink); display: grid;
      grid-template-columns: 28px 1fr; gap: 8px;
    }
    .nav-item:hover { background: #f4f7fb; }
    .nav-item.active { background: var(--blue-soft); border-color: #b7cdf9; color: #164da9; }
    .nav-num { font-weight: 800; color: var(--blue); }
    .nav-name { font-size: 13px; font-weight: 700; }
    .nav-desc { grid-column: 2; color: var(--muted); font-size: 11px; line-height: 1.45; margin-top: 2px; }
    main { min-width: 0; min-height: 0; display: grid; grid-template-rows: 48px minmax(0, 1fr) 34px; }
    .view-head {
      display: flex; align-items: center; gap: 14px; padding: 0 16px; background: #f8fafc;
      border-bottom: 1px solid var(--line);
    }
    .view-head h2 { font-size: 15px; margin: 0; }
    .view-head p { margin: 0; color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .canvas-wrap { position: relative; min-height: 0; overflow: hidden; background: #f4f6f9; cursor: grab; }
    .canvas-wrap.dragging { cursor: grabbing; }
    svg { width: 100%; height: 100%; display: block; user-select: none; }
    .grid-pattern { opacity: .55; }
    .section-box { fill: #fff; stroke: #cbd4e1; stroke-width: 2; rx: 8; }
    .section-title { font-size: 22px; font-weight: 750; fill: #33415c; }
    .section-note { font-size: 15px; fill: #7a879d; }
    .edge { fill: none; stroke: #8190a8; stroke-width: 3; marker-end: url(#arrow); }
    .edge.dashed { stroke-dasharray: 9 8; }
    .edge-label-bg { fill: #f8fafc; stroke: #d7deea; rx: 4; }
    .edge-label { font-size: 14px; fill: #536178; text-anchor: middle; }
    .node-card { cursor: pointer; filter: drop-shadow(0 2px 2px rgba(30, 48, 78, .08)); }
    .node-card:hover .node-bg, .node-card.selected .node-bg { stroke-width: 4; }
    .node-bg { stroke-width: 2; rx: 7; }
    .node-blue .node-bg { fill: var(--blue-soft); stroke: var(--blue); }
    .node-green .node-bg { fill: var(--green-soft); stroke: var(--green); }
    .node-amber .node-bg { fill: var(--amber-soft); stroke: var(--amber); }
    .node-red .node-bg { fill: var(--red-soft); stroke: var(--red); }
    .node-cyan .node-bg { fill: var(--cyan-soft); stroke: var(--cyan); }
    .node-gray .node-bg { fill: var(--gray-soft); stroke: var(--gray); }
    .node-index { font-size: 14px; font-weight: 800; fill: #fff; text-anchor: middle; dominant-baseline: middle; }
    .node-index-bg.blue { fill: var(--blue); }
    .node-index-bg.green { fill: var(--green); }
    .node-index-bg.amber { fill: var(--amber); }
    .node-index-bg.red { fill: var(--red); }
    .node-index-bg.cyan { fill: var(--cyan); }
    .node-index-bg.gray { fill: var(--gray); }
    .node-title { font-size: 18px; font-weight: 760; color: var(--ink); line-height: 1.2; }
    .node-lines { font-size: 14px; color: #4f5d73; line-height: 1.45; margin-top: 7px; }
    .node-code { font-size: 12px; color: #536f9f; margin-top: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .legend {
      display: flex; align-items: center; gap: 18px; padding: 0 16px; background: #fff;
      border-top: 1px solid var(--line); color: var(--muted); font-size: 11px;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .swatch { width: 10px; height: 10px; border-radius: 2px; }
    aside { background: #fff; border-left: 1px solid var(--line); overflow-y: auto; padding: 18px; }
    .detail-eyebrow { color: var(--blue); font-size: 11px; font-weight: 800; margin-bottom: 7px; }
    aside h3 { margin: 0 0 8px; font-size: 18px; line-height: 1.3; }
    .detail-summary { color: var(--muted); line-height: 1.65; font-size: 13px; margin: 0 0 16px; }
    .detail-section { border-top: 1px solid #e4e9f0; padding-top: 13px; margin-top: 13px; }
    .detail-section h4 { margin: 0 0 8px; font-size: 12px; color: #3a4860; }
    .detail-section ul { margin: 0; padding-left: 17px; color: #536178; font-size: 12px; line-height: 1.65; }
    .code-ref { display: block; padding: 8px 9px; background: #f3f6fa; border: 1px solid #dfe5ed; border-radius: 5px; color: #315b9b; font: 11px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; overflow-wrap: anywhere; margin-bottom: 6px; }
    .framework-card { background: #f7f9fc; border: 1px solid var(--line); padding: 10px; border-radius: 6px; color: #4d5b72; font-size: 12px; line-height: 1.6; }
    .empty-detail { color: var(--muted); font-size: 13px; line-height: 1.7; padding-top: 20px; }
    .search-hit .node-bg { stroke: #d92525 !important; stroke-width: 5 !important; }
    @media (max-width: 1050px) {
      .layout { grid-template-columns: 210px minmax(0, 1fr); }
      aside { position: fixed; z-index: 10; right: 12px; top: 82px; bottom: 12px; width: 330px; box-shadow: 0 8px 32px rgba(24, 40, 66, .2); display: none; }
      aside.open { display: block; }
    }
    @media (max-width: 720px) {
      .app { grid-template-rows: 112px minmax(0, 1fr); }
      header { flex-wrap: wrap; padding: 10px 12px; gap: 8px; }
      .brand { min-width: 0; flex: 1; }
      .brand p { display: none; }
      .search { order: 3; max-width: none; width: 100%; }
      .layout { grid-template-columns: 1fr; grid-template-rows: 116px minmax(0, 1fr); }
      nav { border-right: 0; border-bottom: 1px solid var(--line); display: flex; overflow-x: auto; padding: 8px; }
      .nav-title, .nav-desc { display: none; }
      .nav-item { min-width: 145px; margin: 0 5px 0 0; grid-template-columns: 24px 1fr; align-items: center; }
      .view-head p { display: none; }
      .legend { overflow-x: auto; }
      .toolbar .zoom-label { display: none; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <h1>Agent 系统架构与完整链路图谱</h1>
      <p>客服项目全链路 + 可复用大型 Agent 工程框架</p>
    </div>
    <div class="search">
      <input id="searchInput" type="search" placeholder="搜索节点，例如 Planner、MCP、记忆、鉴权">
      <span>⌕</span>
    </div>
    <div class="toolbar">
      <button class="icon-btn" id="zoomOut" title="缩小">−</button>
      <span class="zoom-label" id="zoomLabel">100%</span>
      <button class="icon-btn" id="zoomIn" title="放大">＋</button>
      <button class="icon-btn" id="fitView" title="适应窗口">□</button>
      <button class="icon-btn" id="resetView" title="重置视图">↺</button>
    </div>
  </header>
  <div class="layout">
    <nav id="nav"></nav>
    <main>
      <div class="view-head">
        <h2 id="viewTitle"></h2>
        <p id="viewDescription"></p>
      </div>
      <div class="canvas-wrap" id="canvasWrap">
        <svg id="canvas" role="img" aria-label="Agent 系统架构图">
          <defs>
            <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
              <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dce3ec" stroke-width="1"/>
            </pattern>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,8 L11,4 z" fill="#8190a8"/>
            </marker>
          </defs>
          <rect class="grid-pattern" width="100%" height="100%" fill="url(#grid)"/>
          <g id="viewport"></g>
        </svg>
      </div>
      <div class="legend">
        <span class="legend-item"><span class="swatch" style="background:#2463d4"></span>编排与运行时</span>
        <span class="legend-item"><span class="swatch" style="background:#2f855a"></span>知识与模型</span>
        <span class="legend-item"><span class="swatch" style="background:#b15c00"></span>工具与业务动作</span>
        <span class="legend-item"><span class="swatch" style="background:#c13c36"></span>安全与人工确认</span>
        <span class="legend-item"><span class="swatch" style="background:#11788a"></span>数据与记忆</span>
        <span class="legend-item"><span class="swatch" style="background:#526077"></span>平台治理</span>
      </div>
    </main>
    <aside id="detailPanel">
      <div id="detailContent" class="empty-detail">点击图中的任意节点，查看职责、输入输出、关键约束、代码位置，以及迁移到其他 Agent 项目时可复用的设计原则。</div>
    </aside>
  </div>
</div>
<script>
  const C = {
    blue: "blue", green: "green", amber: "amber", red: "red", cyan: "cyan", gray: "gray"
  };

  function node(id, x, y, w, h, color, title, lines, code, detail = {}) {
    return { id, x, y, w, h, color, title, lines, code, detail };
  }

  function edge(from, to, label = "", options = {}) {
    return { from, to, label, ...options };
  }

  const common = {
    identity: {
      summary: "从认证上下文建立可信身份，后续所有租户、用户、坐席和服务身份都以它为准。",
      input: ["Bearer Token 或服务凭证", "请求来源、设备和租户域"],
      output: ["CurrentPrincipal", "tenant_id / subject / roles / service_identity"],
      guard: ["不相信请求体中的 tenant_id/user_id", "客户、坐席、运营、内部服务使用独立权限边界", "敏感接口记录审计事件"],
      reusable: "任何多租户 Agent 都应先建立可信主体，再让模型参与业务判断。身份不是 Prompt 参数，而是后端运行时上下文。"
    },
    graphState: {
      summary: "保存一次 Agent thread 可恢复的业务状态，只包含可序列化数据。",
      input: ["请求 DTO", "节点增量更新", "HIL 恢复决策"],
      output: ["问题改写、知识、计划、工具结果、确认状态、最终答案"],
      guard: ["不保存 Session、HTTP Client 等进程对象", "State 与 Runtime Context 分离", "字段必须可被 Checkpointer 持久化"],
      reusable: "State 是业务进度快照，Context 是本次运行依赖。把两者分开，Agent 才能跨进程恢复。"
    },
    checkpoint: {
      summary: "在节点边界保存 Graph State，使长任务、人工确认和服务重启后可以继续。",
      input: ["thread_id", "节点执行后的 State"],
      output: ["可恢复 checkpoint", "历史状态版本"],
      guard: ["生产使用持久化存储", "thread_id 与 conversation_id 分工明确", "设置清理与保留周期"],
      reusable: "需要等待、人机协同或长时间运行的 Agent，应把恢复能力作为运行时基础，而不是业务补丁。"
    },
    mcp: {
      summary: "通过标准协议发现并调用独立部署的业务能力，主 Agent 不直接耦合业务系统实现。",
      input: ["工具名、JSON 参数", "服务身份", "高风险动作 approval token"],
      output: ["结构化工具结果", "远端错误和审计信息"],
      guard: ["Streamable HTTP 用于独立部署", "MCP Server 再次校验租户和用户", "工具协议与治理元数据分离"],
      reusable: "MCP 解决工具互操作与边界标准化，不替代鉴权、业务校验、幂等和事务。"
    },
    rag: {
      summary: "把稳定、可追溯的企业知识检索后注入模型上下文，不负责查询实时业务状态。",
      input: ["dense_query / sparse_query", "租户与知识 ACL", "检索策略"],
      output: ["带来源、版本和得分的 KnowledgeChunk"],
      guard: ["Dense 与 BM25 使用一致过滤条件", "只把 Top-K 证据放入 Prompt", "无可靠证据时追问、降级或转人工"],
      reusable: "RAG 的核心不是向量库，而是语料治理、检索融合、证据质量和回答约束组成的闭环。"
    }
  };

  const views = [
    {
      id: "architecture", name: "全局分层架构", desc: "从渠道、接入、编排、智能能力到数据治理的完整系统边界", size: [2440, 1760],
      sections: [
        [40, 40, 2360, 190, "1. 渠道与体验层", "面向用户、坐席和运营人员的交互入口"],
        [40, 260, 2360, 210, "2. API 接入与安全边界", "先确定可信身份，再进入 Agent"],
        [40, 500, 2360, 250, "3. Agent 应用与 LangGraph 编排", "请求级依赖、状态机、计划、恢复"],
        [40, 780, 2360, 260, "4. 智能能力与业务能力", "LLM、RAG、工具、MCP、人工服务"],
        [40, 1070, 2360, 250, "5. 数据与记忆层", "业务事实、知识索引、缓存、Checkpoint"],
        [40, 1350, 2360, 350, "6. 横切治理与交付", "安全、成本、观测、评测、发布和容灾"],
      ],
      nodes: [
        node("web", 100, 100, 270, 90, C.gray, "Web / App 客户端", ["聊天、确认、恢复", "引用证据与状态展示"], "frontend / API contract", {summary:"客户交互入口。前端负责展示状态和采集确认，不承担 Agent 决策。", input:["用户问题、会话 ID、Graph thread ID"], output:["ChatResponse、SSE、确认操作"], guard:["显示请求状态与失败原因", "网络重连后使用 thread_id 恢复"], reusable:"前端只驱动显式交互；业务授权和执行规则必须留在后端。"}),
        node("agentDesk", 470, 100, 270, 90, C.gray, "人工坐席工作台", ["队列、接入、回复", "结论确认与 Bot 恢复"], "api/routes_human_support.py"),
        node("ops", 840, 100, 270, 90, C.gray, "运营与知识后台", ["知识发布、质量评测", "成本、Trace、告警"], "api/routes_ops.py"),
        node("channels", 1210, 100, 350, 90, C.gray, "外部渠道适配", ["企业 IM / 小程序 / 呼叫中心", "统一 Conversation 协议"], "channel adapters"),
        node("admin", 1660, 100, 300, 90, C.gray, "管理员与平台配置", ["租户、角色、模型策略", "密钥和预算配置"], "admin plane"),

        node("gateway", 100, 330, 280, 95, C.blue, "API Gateway / WAF", ["TLS、限流、请求大小", "路由与基础防护"], "deployment gateway"),
        node("fastapi", 480, 330, 280, 95, C.blue, "FastAPI 应用", ["Pydantic 校验", "依赖注入、异常映射"], "main.py / api/*"),
        node("auth", 860, 330, 300, 95, C.red, "认证与 CurrentPrincipal", ["JWT / SSO / 服务身份", "租户与角色边界"], "core/security.py", common.identity),
        node("audit", 1260, 330, 280, 95, C.red, "权限与审计", ["RBAC / ABAC", "敏感字段脱敏"], "security / audit"),
        node("requestCtx", 1640, 330, 290, 95, C.gray, "请求上下文", ["request_id / trace_id", "tenant / user / roles"], "core/middleware.py"),

        node("container", 100, 590, 300, 105, C.blue, "ApplicationContainer", ["应用级 Client / Runtime", "请求级 Agent / Session"], "services/container.py"),
        node("agent", 500, 590, 300, 105, C.blue, "CustomerServiceAgent", ["统一入口 answer/stream", "调用 Graph Runtime"], "services/customer_service_agent.py"),
        node("runtime", 900, 590, 300, 105, C.blue, "Graph Runtime", ["invoke / resume / state", "thread config + durability"], "workflows/runtime.py", common.checkpoint),
        node("graph", 1300, 590, 300, 105, C.blue, "LangGraph StateGraph", ["节点、边、RetryPolicy", "interrupt / Command"], "workflows/customer_service_graph.py", common.graphState),
        node("nodes", 1700, 590, 320, 105, C.blue, "Graph Nodes", ["prepare → rewrite → retrieve", "decide → act → persist"], "workflows/nodes.py"),

        node("llm", 100, 870, 280, 105, C.green, "LLM Gateway", ["模型路由、结构化输出", "Token 统计、超时、降级"], "infrastructure/llm/*"),
        node("rewrite", 470, 870, 280, 105, C.green, "Query Rewrite", ["指代消解、实体保护", "Dense / Sparse 查询"], "services/question_rewrite_service.py"),
        node("retrieval", 840, 870, 300, 105, C.green, "Hybrid RAG", ["Dense + BM25 + RRF", "Rerank + 证据门禁"], "services/rag_service.py", common.rag),
        node("planner", 1230, 870, 300, 105, C.blue, "Planner / DAG Executor", ["结构化计划、依赖校验", "就绪波次、有限并发"], "services/planner_service.py"),
        node("tools", 1620, 870, 280, 105, C.amber, "Tool Registry", ["Schema、Handler、风险", "白名单与超时"], "services/tool_registry.py"),
        node("mcp", 1990, 870, 300, 105, C.amber, "MCP / Business Systems", ["工具发现与调用", "订单、售后、会员、搜索"], "infrastructure/mcp/*", common.mcp),

        node("mysql", 100, 1160, 270, 105, C.cyan, "业务数据库", ["会话、消息、工单", "PendingAction、用量"], "infrastructure/db/*"),
        node("redis", 450, 1160, 270, 105, C.cyan, "Redis", ["语义缓存、短期状态", "分布式锁与幂等"], "infrastructure/cache/*"),
        node("vector", 800, 1160, 300, 105, C.cyan, "Qdrant / Milvus", ["Dense 向量与 Payload", "租户和 ACL 过滤"], "infrastructure/vector_store/*"),
        node("search", 1190, 1160, 280, 105, C.cyan, "OpenSearch", ["BM25、规则编号", "产品型号与精确词"], "infrastructure/lexical/*"),
        node("checkpointer", 1560, 1160, 300, 105, C.cyan, "Postgres Checkpointer", ["Graph State 版本", "HIL 挂起与恢复"], "workflows/runtime.py", common.checkpoint),
        node("knowledge", 1950, 1160, 300, 105, C.cyan, "Knowledge Corpus", ["版本、ACL、有效期", "引用、冲突、发布批次"], "knowledge_base / ingest"),

        node("security", 90, 1450, 270, 120, C.red, "安全治理", ["Prompt 注入防护、最小权限", "审批、审计、密钥轮换"], "security plane"),
        node("cost", 430, 1450, 270, 120, C.gray, "成本治理", ["租户等级、Token 预算", "模型/RAG/历史窗口降级"], "services/cost_governance_service.py"),

        node("x3", 820, 1435, 280, 120, C.red, "③ 安全与 HIL", ["风险分级、审批", "审计与防重放"], "safety"),
        node("x4", 1180, 1435, 280, 120, C.gray, "④ 成本与性能", ["模型路由、缓存", "并发、预算、降级"], "cost"),
        node("x5", 1540, 1435, 280, 120, C.gray, "⑤ 可观测性", ["Trace / Metrics / Logs", "质量与业务指标"], "observability"),
        node("x6", 1900, 1435, 280, 120, C.red, "⑥ 一致性", ["事务、幂等、Outbox", "补偿与对账"], "consistency"),
        node("x7", 280, 1650, 300, 120, C.green, "⑦ 评测", ["离线集、在线反馈", "安全与对抗测试"], "evaluation"),
        node("x8", 740, 1650, 300, 120, C.gray, "⑧ 可靠性", ["超时、重试、熔断", "隔离、容灾、恢复"], "reliability"),
        node("x9", 1200, 1650, 300, 120, C.gray, "⑨ 交付治理", ["版本、CI、灰度、回滚", "迁移、备份、密钥"], "delivery"),
        node("checklist", 1660, 1630, 600, 150, C.blue, "设计评审五问", ["事实从哪里来？动作由谁真正执行？", "错误如何被发现和纠正？", "中断后如何恢复且不重复执行？", "质量、成本和业务成功如何量化？"], "architecture review"),
      ],
      edges: [
        edge("goal","facts"), edge("facts","actions"), edge("actions","risk"), edge("risk","sla"), edge("sla","fallback"),
        edge("input","understand"), edge("understand","context"), edge("context","plan"), edge("plan","act"), edge("act","observe"), edge("observe","validate"), edge("validate","answer","通过"), edge("validate","recover","失败"), edge("recover","plan","可重试"), edge("recover","answer","降级/人工"), edge("answer","state"), edge("state","feedback"), edge("feedback","iterate"), edge("iterate","input"),
        edge("choose","bound"), edge("bound","human"), edge("human","truth"), edge("truth","result")
      ]
    }
  ];

  const state = { viewIndex: 0, scale: 1, tx: 0, ty: 0, dragging: false, x: 0, y: 0, selected: null };
  const nav = document.getElementById("nav");
  const viewport = document.getElementById("viewport");
  const canvas = document.getElementById("canvas");
  const canvasWrap = document.getElementById("canvasWrap");
  const detailPanel = document.getElementById("detailPanel");
  const detailContent = document.getElementById("detailContent");

  function renderNav() {
    nav.innerHTML = '<div class="nav-title">图谱目录</div>' + views.map((view, index) => `
      <button class="nav-item ${index === state.viewIndex ? "active" : ""}" data-index="${index}">
        <span class="nav-num">${String(index + 1).padStart(2, "0")}</span>
        <span class="nav-name">${view.name}</span>
        <span class="nav-desc">${view.desc}</span>
      </button>`).join("");
    nav.querySelectorAll(".nav-item").forEach(item => item.addEventListener("click", () => {
      state.viewIndex = Number(item.dataset.index);
      state.selected = null;
      renderNav(); renderView(); fitView(); clearDetail();
    }));
  }

  function sectionMarkup(section) {
    const [x, y, w, h, title, note] = section;
    return `<g><rect class="section-box" x="${x}" y="${y}" width="${w}" height="${h}"/>
      <text class="section-title" x="${x + 22}" y="${y + 34}">${title}</text>
      <text class="section-note" x="${x + 22}" y="${y + 60}">${note}</text></g>`;
  }

  function nodeMarkup(n, index) {
    const lineHtml = n.lines.map(value => `<div>• ${value}</div>`).join("");
    return `<g class="node-card node-${n.color}" data-id="${n.id}" transform="translate(${n.x},${n.y})">
      <rect class="node-bg" width="${n.w}" height="${n.h}"/>
      <circle class="node-index-bg ${n.color}" cx="25" cy="25" r="15"/>
      <text class="node-index" x="25" y="25">${index + 1}</text>
      <foreignObject x="49" y="13" width="${n.w - 60}" height="${n.h - 20}">
        <div xmlns="http://www.w3.org/1999/xhtml">
          <div class="node-title">${n.title}</div>
          <div class="node-lines">${lineHtml}</div>
          ${n.code ? `<div class="node-code">${n.code}</div>` : ""}
        </div>
      </foreignObject>
    </g>`;
  }

  function anchor(n, side) {
    if (side === "left") return [n.x, n.y + n.h / 2];
    if (side === "right") return [n.x + n.w, n.y + n.h / 2];
    if (side === "top") return [n.x + n.w / 2, n.y];
    return [n.x + n.w / 2, n.y + n.h];
  }

  function edgeMarkup(e, nodesById) {
    const a = nodesById[e.from], b = nodesById[e.to];
    if (!a || !b) return "";
    const dx = (b.x + b.w / 2) - (a.x + a.w / 2);
    const dy = (b.y + b.h / 2) - (a.y + a.h / 2);
    let fromSide, toSide;
    if (Math.abs(dx) >= Math.abs(dy)) {
      fromSide = dx >= 0 ? "right" : "left";
      toSide = dx >= 0 ? "left" : "right";
    } else {
      fromSide = dy >= 0 ? "bottom" : "top";
      toSide = dy >= 0 ? "top" : "bottom";
    }
    const [x1, y1] = anchor(a, e.fromSide || fromSide);
    const [x2, y2] = anchor(b, e.toSide || toSide);
    let path;
    if (e.points) {
      path = `M ${x1} ${y1} ` + e.points.map(p => `L ${p[0]} ${p[1]}`).join(" ") + ` L ${x2} ${y2}`;
    } else if (Math.abs(dx) >= Math.abs(dy)) {
      const mx = (x1 + x2) / 2;
      path = `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`;
    } else {
      const my = (y1 + y2) / 2;
      path = `M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}`;
    }
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    const label = e.label ? `<g><rect class="edge-label-bg" x="${mx - 55}" y="${my - 14}" width="110" height="24"/><text class="edge-label" x="${mx}" y="${my + 3}">${e.label}</text></g>` : "";
    return `<g><path class="edge ${e.dashed ? "dashed" : ""}" d="${path}"/>${label}</g>`;
  }

  function renderView() {
    const view = views[state.viewIndex];
    document.getElementById("viewTitle").textContent = view.name;
    document.getElementById("viewDescription").textContent = view.desc;
    canvas.setAttribute("viewBox", `0 0 ${canvasWrap.clientWidth || 1200} ${canvasWrap.clientHeight || 800}`);
    const nodesById = Object.fromEntries(view.nodes.map(n => [n.id, n]));
    viewport.innerHTML = view.sections.map(sectionMarkup).join("") +
      `<g class="edges">${view.edges.map(e => edgeMarkup(e, nodesById)).join("")}</g>` +
      `<g class="nodes">${view.nodes.map(nodeMarkup).join("")}</g>`;
    viewport.querySelectorAll(".node-card").forEach(card => card.addEventListener("click", event => {
      event.stopPropagation();
      selectNode(card.dataset.id);
    }));
    applyTransform();
  }

  function selectNode(id) {
    const view = views[state.viewIndex];
    const n = view.nodes.find(item => item.id === id);
    if (!n) return;
    state.selected = id;
    detailContent.className = "";
    viewport.querySelectorAll(".node-card").forEach(card => card.classList.toggle("selected", card.dataset.id === id));
    const d = n.detail || {};
    const list = values => values?.length ? `<ul>${values.map(v => `<li>${v}</li>`).join("")}</ul>` : "<div class='framework-card'>该节点的字段和行为以代码契约为准。</div>";
    detailContent.innerHTML = `
      <div class="detail-eyebrow">${view.name} · ${n.color.toUpperCase()}</div>
      <h3>${n.title}</h3>
      <p class="detail-summary">${d.summary || n.lines.join("；") + "。"}</p>
      <div class="detail-section"><h4>输入</h4>${list(d.input)}</div>
      <div class="detail-section"><h4>输出</h4>${list(d.output)}</div>
      <div class="detail-section"><h4>关键约束</h4>${list(d.guard)}</div>
      <div class="detail-section"><h4>项目代码位置</h4><span class="code-ref">${n.code || "架构层能力"}</span></div>
      <div class="detail-section"><h4>迁移到其他 Agent 时</h4><div class="framework-card">${d.reusable || "保留该节点的输入输出契约和治理边界，替换具体业务实现即可。"}</div></div>`;
    detailPanel.classList.add("open");
  }

  function clearDetail() {
    detailContent.innerHTML = "点击图中的任意节点，查看职责、输入输出、关键约束、代码位置，以及迁移到其他 Agent 项目时可复用的设计原则。";
    detailContent.className = "empty-detail";
    detailPanel.classList.remove("open");
  }

  function applyTransform() {
    viewport.setAttribute("transform", `translate(${state.tx} ${state.ty}) scale(${state.scale})`);
    document.getElementById("zoomLabel").textContent = `${Math.round(state.scale * 100)}%`;
  }

  function fitView() {
    const view = views[state.viewIndex];
    const w = canvasWrap.clientWidth, h = canvasWrap.clientHeight;
    state.scale = Math.min((w - 40) / view.size[0], (h - 40) / view.size[1]);
    state.tx = (w - view.size[0] * state.scale) / 2;
    state.ty = (h - view.size[1] * state.scale) / 2;
    applyTransform();
  }

  function zoomAt(factor, cx = canvasWrap.clientWidth / 2, cy = canvasWrap.clientHeight / 2) {
    const old = state.scale;
    const next = Math.max(.18, Math.min(2.2, old * factor));
    const worldX = (cx - state.tx) / old, worldY = (cy - state.ty) / old;
    state.scale = next;
    state.tx = cx - worldX * next;
    state.ty = cy - worldY * next;
    applyTransform();
  }

  document.getElementById("zoomIn").addEventListener("click", () => zoomAt(1.18));
  document.getElementById("zoomOut").addEventListener("click", () => zoomAt(.84));
  document.getElementById("fitView").addEventListener("click", fitView);
  document.getElementById("resetView").addEventListener("click", () => { state.scale = 1; state.tx = 20; state.ty = 20; applyTransform(); });
  canvasWrap.addEventListener("wheel", event => { event.preventDefault(); const rect = canvasWrap.getBoundingClientRect(); zoomAt(event.deltaY < 0 ? 1.1 : .9, event.clientX - rect.left, event.clientY - rect.top); }, {passive:false});
  canvasWrap.addEventListener("pointerdown", event => { if (event.target.closest(".node-card")) return; state.dragging = true; state.x = event.clientX; state.y = event.clientY; canvasWrap.classList.add("dragging"); canvasWrap.setPointerCapture(event.pointerId); });
  canvasWrap.addEventListener("pointermove", event => { if (!state.dragging) return; state.tx += event.clientX - state.x; state.ty += event.clientY - state.y; state.x = event.clientX; state.y = event.clientY; applyTransform(); });
  canvasWrap.addEventListener("pointerup", () => { state.dragging = false; canvasWrap.classList.remove("dragging"); });
  canvasWrap.addEventListener("click", event => { if (event.target === canvas || event.target.classList.contains("grid-pattern")) clearDetail(); });
  document.getElementById("searchInput").addEventListener("input", event => {
    const query = event.target.value.trim().toLowerCase();
    const view = views[state.viewIndex];
    viewport.querySelectorAll(".node-card").forEach(card => {
      const n = view.nodes.find(item => item.id === card.dataset.id);
      const haystack = `${n.title} ${n.lines.join(" ")} ${n.code || ""}`.toLowerCase();
      card.classList.toggle("search-hit", Boolean(query && haystack.includes(query)));
    });
  });
  window.addEventListener("resize", () => { canvas.setAttribute("viewBox", `0 0 ${canvasWrap.clientWidth} ${canvasWrap.clientHeight}`); fitView(); });

  renderNav();
  renderView();
  requestAnimationFrame(fitView);
</script>
</body>
</html>
